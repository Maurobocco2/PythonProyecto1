<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}Service de PC{% endblock %}</title>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        />
    </head>
    <body>
        <header>
            <nav class="navbar navbar-light bg-light static-top">
                <div class="container">
                    <a class="navbar-brand" href="{% url 'myapp:index' %}">
                        Inicio
                    </a>
                    <a class="navbar-brand" href="{% url 'myapp:clientes' %}">
                        Clientes
                    </a>
                    <a class="navbar-brand" href="{% url 'myapp:tecnicos' %}">
                        Tecnicos
                    </a>
                    <a class="navbar-brand" href="{% url 'myapp:equipos' %}">
                        Equipos
                    </a>
                    <a
                        class="navbar-brand"
                        href="{% url 'myapp:reparaciones' %}"
                    >
                        Reparaciones
                    </a>
                    <a class="btn btn-primary" href="#NADA">INICIAR</a>
                </div>
            </nav>
        </header>
        <main>
            {% block content}
            <!-- Contenido Especifico de cada paquina aqui  -->{% endblock%}
        </main>
        <footer
            class="text-center text-white py-3 mt-auto"
            style="background: linear-gradient(90deg, #250397, #1a0242)"
        >
            <div class="container">
                <p class="mb-0">
                    &copy; 2025 Service PC. Todos los derechos reservados.
                </p>
            </div>
        </footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
